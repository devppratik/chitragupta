version: '3.8'

services:
  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_TYPE=postgres
      - DB_DSN=host=db user=chitragupta password=chitragupta dbname=chitragupta sslmode=disable
      - STORAGE_PATH=/app/storage/packages
      - PORT=8080
    volumes:
      - ./storage:/app/storage
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=chitragupta
      - POSTGRES_PASSWORD=chitragupta
      - POSTGRES_DB=chitragupta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
